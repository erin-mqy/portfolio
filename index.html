<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Portfolio</title>
  
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="wallpaper-a" class="wallpaper"></div>
<div id="wallpaper-b" class="wallpaper"></div>
<canvas id="stars"></canvas>

<!-- Status Bar -->
<div id="statusbar">
  <div class="left">
    <span class="sb-logo">d e k o l a b</span>
    <span class="sb-menu" id="sb-file">File</span>
    <!-- <span class="sb-menu">Edit</span>
    <span class="sb-menu">View</span>
    <span class="sb-menu">Help</span> -->
  </div>
  <div class="right">
    <span id="clock"></span>
  </div>
  <div id="sb-taskbar"></div>
</div>

<!-- Desktop -->
<div id="desktop">
  <div id="terminal">

    <!-- Title bar -->
    <div id="titlebar">
      <div class="dot red"    title="close"></div>
      <div class="dot yellow" title="minimize"></div>
      <div class="dot green"  title="maximize"></div>
      <div id="titlebar-label">visitor@portfolio — terminal</div>
    </div>

    <!-- Output -->
    <div id="terminal-body"></div>

    <!-- Input -->
    <div id="input-area">
      <span id="input-prompt">visitor@portfolio:~$</span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" autofocus placeholder="type a command...">
    </div>

    <div class="resize-handle"></div>
  </div>
</div>

<script src="js/starfield.js"></script>
<script src="js/wallpaper.js"></script>
<script src="js/clock.js"></script>
<script src="js/wm.js"></script>
<script src="js/terminal.js"></script>
<script src="js/viewers.js"></script>
<script src="js/explorer.js"></script>
</body>
</html>
